<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZENITH ENGINE v2.0</title>
<style>
body {
  margin: 0;
  background: black;
  color: #b26cff;
  font-family: monospace;
  overflow: hidden;
}
#boot { padding: 20px; white-space: pre-line; }
#ui { display: none; padding: 20px; }
h1 { color: #b26cff; letter-spacing: 2px; }
.panel { border: 1px solid #b26cff; padding: 10px; margin-top: 10px; }
button {
  background: black; color: #b26cff;
  border: 1px solid #b26cff; padding: 10px; cursor: pointer;
}
button:hover { background: #b26cff; color: black; }
button.active {
  background: #b26cff; color: black;
}
button:disabled {
  opacity: 0.3; cursor: not-allowed;
}
button:disabled:hover { background: black; color: #b26cff; }
#log {
  height: 180px; overflow-y: auto;
  border: 1px dashed #b26cff; padding: 10px; margin-top: 10px;
}
.glitch { animation: flicker 0.15s infinite; }
@keyframes flicker {
  0%{opacity:1;} 50%{opacity:0.6;} 100%{opacity:1;}
}
.err { color: #ff4444; }
</style>
</head>
<body>

<div id="boot"></div>

<div id="ui">
  <h1 class="glitch">TERMINAL</h1>

  <div class="panel">
    <button id="btn-new"     onclick="setLayer('new')">LAYER I — RECENT FALLEN</button>
    <button id="btn-mid"     onclick="setLayer('mid')">LAYER II — FORGOTTEN ERA</button>
    <button id="btn-ancient" onclick="setLayer('ancient')">LAYER III — PRE-ARCHIVE</button>
    <button id="btn-pseudo"  onclick="setLayer('pseudo')">PSUEDO RANDOM NODE</button>
    <button onclick="blackout()" id="blackBtn" style="display:none;">BLACKOUT LAYER</button>
  </div>

  <div class="panel">
    <button onclick="scan()" id="scanBtn" disabled>SCAN NODE</button>
    <button onclick="corrupt()">FORCE CORRUPTION</button>
  </div>

  <div id="output" class="panel">STANDBY</div>
  <div id="log"></div>
</div>

<script>

const boot = [
  "Initializing ZENITH ENGINE...",
  "Loading temporal archive layers...",
  "Reconstructing YouTube metadata fragments...",
  "Scanning 20,000,000,000+ video nodes...",
  "WARNING: index instability detected",
  "Injecting corruption tolerance layer...",
  "System online.",
  "",
  "Credits:",
  "Core inspiration framework: KVN AUST"
];

let i = 0;
const bootBox = document.getElementById("boot");

function bootSeq(){
  if(i < boot.length){
    bootBox.innerText += boot[i] + "\n";
    i++;
    setTimeout(bootSeq, 500);
  } else {
    document.getElementById("ui").style.display = "block";
  }
}
bootSeq();

let layer = null;
let scans = 0;

const layerBefore = {
  new:    "2023",
  mid:    "2016",
  ancient:"2010"
};

const layerBtns = ["btn-new","btn-mid","btn-ancient","btn-pseudo"];

function setLayer(l){
  layer = l;

  layerBtns.forEach(id => {
    document.getElementById(id).classList.remove("active");
  });
  document.getElementById("btn-" + l).classList.add("active");

  const label = {
    new: "LAYER I — RECENT FALLEN",
    mid: "LAYER II — FORGOTTEN ERA",
    ancient: "LAYER III — PRE-ARCHIVE",
    pseudo: "PSUEDO RANDOM NODE"
  }[l];

  log("Layer switched → " + label);
  document.getElementById("output").innerText = "ACTIVE NODE: " + label;
  document.getElementById("scanBtn").disabled = false;
}

function r(n){ return Math.floor(Math.random()*n); }
function pad(n,l){ return n.toString().padStart(l,"0"); }

let lastSeed = null;

function mutate(seed){
  if(!seed) return seed;
  return seed.split("").map(c=>{
    return Math.random() < 0.15 ? String.fromCharCode(97+r(26)) : c;
  }).join("");
}

function gen(mode){
  let pool = [
    "IMG XXXX","DSC XXXX","MOV XXXX","VID YYYYMMDD",
    "Screen Recording YYYY MM DD","Capture YYYYMMDD",
    "WhatsApp Video YYYY","Desktop YYYY MM DD",
    "GOPRXXXX","CIMGXXXX","Untitled video",
    "Test upload","Copy of Copy","Videoplayback"
  ];

  let q;
  if(mode === "pseudo"){
    q = pool[r(pool.length)];
  } else {
    if(layer === "new")    q = pool[r(6)];
    if(layer === "mid")    q = pool[r(9)];
    if(layer === "ancient")q = pool[9 + r(pool.length-9)];
  }

  if(lastSeed && Math.random() < 0.4){ q = mutate(q); }
  lastSeed = q;

  q = q.replace(/XXXX/g, pad(r(9999),4));
  q = q.replace(/YYYYMMDD/g, ()=>{
    const y = 2006 + r(21);
    return y + pad(1+r(12),2) + pad(1+r(28),2);
  });
  q = q.replace(/YYYY/g, 2006 + r(21));
  q = q.replace(/MM/g, pad(1+r(12),2));
  q = q.replace(/DD/g, pad(1+r(28),2));

  return q;
}

function scan(){
  if(!layer){
    log('<span class="err">ERR // NO LAYER SELECTED — SELECT A NODE BEFORE SCANNING</span>');
    document.getElementById("output").innerText = "ERROR: NO LAYER SELECTED";
    return;
  }

  const isPseudo = layer === "pseudo";
  let q = gen(isPseudo ? "pseudo" : "normal");

  let fullQ = q;
  if(!isPseudo){
    fullQ = q + " before:" + layerBefore[layer];
  }

  scans++;
  log("NODE → " + fullQ + (isPseudo ? " [no time sort]" : ""));

  window.open(
    "https://www.youtube.com/results?search_query=" + encodeURIComponent(fullQ),
    "_blank"
  );

  document.getElementById("output").innerText = isPseudo
    ? "PSUEDO NODE STREAM ACTIVE (" + scans + ") // UNSORTED"
    : "NODE STREAM ACTIVE (" + scans + ") // BEFORE:" + layerBefore[layer];

  if(scans > 8){
    document.getElementById("blackBtn").style.display = "inline-block";
  }
}

function corrupt(){
  document.body.style.background = "#120018";
  document.getElementById("output").innerText = "⚠ CORRUPTION EVENT ⚠";
  setTimeout(()=>{ document.body.style.background = "black"; }, 1200);
  log("SYSTEM CORRUPTION TRIGGERED");
}

function blackout(){
  document.body.style.background = "#000000";
  document.body.style.color = "#ff00ff";
  document.getElementById("output").innerText =
    "BLACKOUT LAYER ACTIVE // UNSORTED ARCHIVE ACCESS";
  log("BLACKOUT LAYER ACCESSED");
}

function log(msg){
  const box = document.getElementById("log");
  const t = new Date().toTimeString().split(" ")[0];
  box.innerHTML += `[${t}] ${msg}<br>`;
  box.scrollTop = box.scrollHeight;
}

</script>
</body>
</html>
